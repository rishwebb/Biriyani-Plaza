<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Biriyani Plaza</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .checkout-container {
      max-width: 600px;
      margin: 100px auto 50px;
      background: rgba(15,15,15,0.7);
      padding: 40px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-muted);
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
    }
    .form-group input:focus, .form-group textarea:focus {
      outline: none;
      border-color: var(--accent-orange);
    }
  </style>
</head>
<body>

  <!-- Global Navbar -->
  <nav class="navbar scrolled" id="navbar">
    <div class="container nav-container">
      <a href="index.html" class="logo"><span class="text-gradient">Biriyani</span>Plaza</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="order.html">Order Online</a>
      </div>
      <div class="nav-actions">
        <a href="cart.html" class="cart-icon" style="text-decoration:none;">
          <i class="fa-solid fa-bag-shopping"></i>
          <span class="cart-count">0</span>
        </a>
      </div>
    </div>
  </nav>

  <section class="section">
    <div class="container">
      <div class="checkout-container">
        <h2 style="margin-bottom: 20px; font-size: 2rem;">Secure <span class="text-gradient">Checkout</span></h2>
        <form id="checkoutForm" onsubmit="handleCheckout(event)">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" required placeholder="John Doe">
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" required placeholder="+91 9876543210">
          </div>
          <div class="form-group">
            <label for="address">Delivery Address (Chakdaha Only)</label>
            <textarea id="address" rows="3" required placeholder="Enter full address..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px; font-size: 1.1rem; margin-top: 10px;">Confirm & Pay on Delivery</button>
        </form>
      </div>
    </div>
  </section>

  <!-- Massive Footer -->
  <footer class="main-footer">
    <div class="container footer-grid">
      <div class="footer-brand">
        <h2><span class="text-gradient">Biriyani</span> Plaza</h2>
        <p>Experience the ultimate dining journey in India. Best Biryani in Chakdaha Locality.</p>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    function handleCheckout(e) {
      e.preventDefault();
      // Clear cart
      localStorage.removeItem('bp_cart');
      // Redirect
      window.location.href = "thanks.html";
    }
  </script>
</body>
</html>
